<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escape Map</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    #globeViz {
      width: 100vw;
      height: 100vh;
    }

        #infoBox {

        display: none;
      position: absolute;
      top: 20px;
      right: 20px;

      width: 250px;
      min-height: 120px;

      background: rgba(0,0,0,0.85);
      border: 1px solid white;

      color: white;

      padding: 16px;
      border-radius: 12px;

      z-index: 100;
    }

    .title {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      z-index: 10;
      font-size: 24px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="title"></div>
  <div id="globeViz"></div>
  <div id="infoBox">WAAAAAAAAAAAAAAAAAAA</div>

  <!-- Globe.gl -->
  <script src="https://unpkg.com/globe.gl"></script>
  <script src="https://cdn.jsdelivr.net/npm/three/build/three.min.js"></script>

  <script>

    // Sample locations
    const locations = [
      {
        lat: 33.941089,
        lng: -118.409335,
        size: 0.01,
        color: "red",
        name: "Los Angeles International Airport",
        description: "Population: 3.8 million"
      },
      {
        lat: 33.767662,
        lng: -118.392392,
        size: 0.01,
        color: "red",
        name: "Fred Hesse Community Park",
        description: "Population: 0 rn lmao"
      },
    //   {
    //     lat: 35.68,
    //     lng: 139.69,
    //     size: 0.3,
    //     color: "cyan",
    //     label: "Tokyo"
    //   }
    ];

    // // Arc between locations
    // const arcs = [
    //   {
    //     startLat: 34.05,
    //     startLng: -118.24,
    //     endLat: 35.68,
    //     endLng: 139.69,
    //     color: ["orange", "yellow"]
    //   }
    // ];

    // Create globe
    const globe = Globe()
      (document.getElementById("globeViz"));

    // Globe appearance
    globe
      // .globeImageUrl('//cdn.jsdelivr.net/npm/three-globe/example/img/earth-dark.jpg')
    //   .bumpImageUrl("//unpkg.com/three-globe/example/img/earth-topology.png")
      .backgroundImageUrl("//unpkg.com/three-globe/example/img/night-sky.png")

      // Load country polygons
      .polygonsData([])

    // fetch("https://unpkg.com/world-atlas/countries-110m.json")
    //   .then(res => res.json())
    //   .then(worldData => {

    //     // Convert topojson -> geojson
    //     const countries = topojson.feature(
    //       worldData,
    //       worldData.objects.countries
    //     ).features;
    
    // globe
    //     .polygonsData(countries)

    //     .polygonCapColor(() => "rgba(0,0,0,0)")

    //               .polygonSideColor(() => "rgba(0,0,0,0)")
    //       .polygonStrokeColor(() => "#ffffff")

    //       // Thin outlines
    //       .polygonAltitude(0.003)
    //  });

    // --------------------
// 1. COUNTRIES LAYER
// --------------------
fetch("https://unpkg.com/world-atlas@2/countries-110m.json")
  .then(res => res.json())
  .then(world => {
    const countries = topojson.feature(
      world,
      world.objects.countries
    ).features;

    globe
      .polygonsData(countries)
  .polygonCapColor("rgba(0,0,0,0.5)"
)

  .polygonStrokeColor(() => "#ffffff"
  )
.polygonSideColor(() => "rgba(0,0,0,0)")
        .polygonAltitude(0.000);
  });

// --------------------
// 2. US STATES LAYER
// --------------------
fetch("https://unpkg.com/us-atlas/states-10m.json")
  .then(res => res.json())
  .then(us => {
    const states = topojson.feature(
      us,
      us.objects.states
    ).features;

    globe
      .polygonsData([
        ...(globe.polygonsData() || []),
        ...states
      ])

      // Style states differently
      .polygonCapColor(d =>
        d.properties && d.properties.name
          ? "rgba(0,0,0,0)"
          : "rgba(0,0,0,0)"
      )
      .polygonStrokeColor(d =>
        d.properties && d.properties.name
          ? "#808080" // states white
          : "#444"
      );
  });

     const infoBox = document.getElementById("infoBox")

     globe
      // Atmosphere
      .showGlobe(true)
      .showAtmosphere(false)
    //   .atmosphereColor("lightskyblue")
      .atmosphereAltitude(0.15)

    //   // Points
      .pointsData(locations)
      .pointLat(d => d.lat)
      .pointLng(d => d.lng)
      .pointAltitude(0.01)
      .pointColor(d => d.color)
      .pointRadius(d => d.size)
        .pointLabel(d => `
          <b>${d.name}</b><br/>
          ${d.description}
        `)

          // Click handler
          // 
          


.onPointClick(point => {

  

  infoBox.style.display = "block";

  infoBox.innerHTML = `
    <h2>${point.name}</h2>
    <p>${point.description}</p>
  `;
})

.controls().addEventListener("start", () => {

  infoBox.style.display = "none";

})
    //   .pointLabel(d => d.label)

    //   // Arcs
    //   .arcsData(arcs)
    //   .arcColor(d => d.color)
    //   .arcDashLength(0.4)
    //   .arcDashGap(2)
    //   .arcDashAnimateTime(2000);

    // Camera position
    globe.pointOfView(
      { lat: 34, lng: -118.2, altitude: 0.5 },
      1000
    );

globe.globeMaterial(
  new THREE.MeshBasicMaterial({
    color: "#000000",
    transparent: true,
    opacity: 0.9
  })
);

globe.pointsTransitionDuration(0);

function updatePointSize() {

  const altitude = globe.pointOfView().altitude;

let size = Math.sqrt(altitude) * 0.08;

  size = Math.max(0.01, size);
  size = Math.min(0.1, size);

  globe.pointRadius(size);
}

updatePointSize();

globe.controls().addEventListener("change", updatePointSize);

  </script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
</body>
</html>
