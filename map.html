<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escape Map</title>
  

    <!-- Load Libraries -->

    <!-- Also load GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/embla-carousel@8.6.0/embla-carousel.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/embla-carousel-autoplay/embla-carousel-autoplay.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
    <!-- Adjust CSS -->
    <link rel="stylesheet" href="stylesheets/map.css">

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    #globeViz {
      width: 100vw;
      height: 100vh;
    }

#infoBox {
opacity:0;
visibility: hidden;
position: absolute;

  top: 20px;
  right: 20px;

  width: 400px;
  height:450px;
  max-height: 50vh;

  overflow: visible;

  background: rgba(0,0,0,0.9);
  color: white;

  border-radius: 12px;
  border: 1px solid white;

  padding: 16px;

  z-index: 100;

  box-sizing: border-box;
}

@media (max-width: 768px) {

  #infoBox {

    left: 20px;
    right: 20px;

    width: auto;
  }

}

.embla__viewport {  overflow: hidden;}
.embla__container {  display: flex;  touch-action: pan-y pinch-zoom;}
.embla__slide {  flex: 0 0 100%;  min-width: 0; max-height: 30vh;}
.embla__slide img {
  width: 100%;
  height: 100%;

  object-fit: cover;

  display: block;
}
.embla__prev:disabled,.embla__next:disabled {  opacity: 0.3;  cursor: not-allowed;}

    .title {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      z-index: 10;
      font-size: 24px;
      font-weight: bold;
    }
  </style>
  
</head>

<body>
  <div class="title"></div>
  <div id="globeViz"></div>
  <div id="infoBox">
    <div id="infoBoxTitle"></div>
    <div class="embla">
      <div class="embla__viewport">
        <div class="embla__container" id="embla_slides">

        </div>
      </div>
      <div class="embla__slide__desc"></div>
    </div>
</div>


</div>

  <!-- Globe.gl -->
  <script src="https://unpkg.com/globe.gl"></script>
  <script src="https://cdn.jsdelivr.net/npm/three/build/three.min.js"></script>

  <script>

    // Sample locations
    const locations = [
      {
        lat: 34.03929054041106, 
        lng: -118.32032562275671,
        size: 0.01,
        color: "red",
        name: "Hatch Escapes",
        rooms: [ 
          { photo: "./images/escaperooms/hatch1.avif", name: "Lab Rat" },
          { photo: "./images/escaperooms/hatch2.avif", name: "Lab Rat" },
          { photo: "./images/escaperooms/hatch3.avif", name: "The Nest" },
          { photo: "./images/escaperooms/hatch4.avif", name: "The Ladder" },
          { photo: "./images/escaperooms/hatch5.avif", name: "The Nest" }
        ]
      },
      {
        lat: 33.805306388301986, 
        lng: -117.91176992339383,
        size: 0.01,
        color: "red",
        name: "Mission Escape Games",
        rooms: [
          { photo: "./images/escaperooms/mission1.avif", name: "Operation: End of Days" },
          { photo: "./images/escaperooms/mission2.avif", name: "Escape the Darkest Hour" },
          { photo: "./images/escaperooms/mission3.avif", name: "Escape the Hydeout" },
          { photo: "./images/escaperooms/mission4.avif", name: "Ultimate Bank Heist" },
          { photo: "./images/escaperooms/mission5.avif", name: "Escape the Nemesis" }
        ]
      },
      {
        lat: 37.8302581228411,
        lng: -122.27935550417024,
        size: 0.01,
        color: "red",
        name: "Trivium Games",
        rooms: [
          { photo: "./images/escaperooms/trivium1.avif", name: "Ghost Patrol" },
          { photo: "./images/escaperooms/trivium2.avif", name: "Ghost Patrol" },
          { photo: "./images/escaperooms/trivium3.avif", name: "Ghost Patrol" }
      ]
      },
      {
        lat: 33.6762402714731,
        lng: -111.9654508795286,
        size: 0.01,
        color: "red",
        name: "The Nemesis Club",
        rooms: [
          { photo: "./images/escaperooms/nemesis1.avif", name: "Mogollon Monster" },
          { photo: "./images/escaperooms/nemesis2.avif", name: "EVIL Robots" }
      ]
      },
      {
        lat: 40.76314055001625, 
        lng: -111.89444665300861,
        size: 0.01,
        color: "red",
        name: "Himitsu Station",
        rooms: [
          { photo: "./images/escaperooms/himitsu1.avif", name: "The Forgotten Markets" }
      ]
      },
    ];

    // Create globe
    const globe = Globe()
      (document.getElementById("globeViz"));

    // Globe appearance
    globe
      .globeImageUrl('images/earth-dark.avif')
      .backgroundImageUrl("images/night-sky.avif")
      .polygonsTransitionDuration(0)

      // Load country polygons
      .polygonsData([])

fetch("assets/map.json")
  .then(res => res.json())
  .then(world => {
    const countries = topojson.feature(
      world,
      world.objects.layer
    ).features;

    globe
      .polygonsData(countries)
  .polygonCapColor("rgba(0,0,0,0.5)"
)

  .polygonStrokeColor(() => "#ffffff"
  )
.polygonSideColor(() => "rgba(0,0,0,0)")
        .polygonAltitude(0.001);
  });

     const infoBox = document.getElementById("infoBox")

globe
  // Atmosphere
  .showGlobe(true)
  .showAtmosphere(false)
  .atmosphereAltitude(0.15)

  // Points
  .pointsData(locations)
  .pointLat(d => d.lat)
  .pointLng(d => d.lng)
  .pointAltitude(0.01)
  .pointColor(d => d.color)
  .pointRadius(d => d.size)
  .pointLabel(d => `
  <b>${d.name}</b>
  `)


let emblaApi = null;




globe.onPointClick(point => {

  const infoBox = document.getElementById("infoBox");

  infoBox.style.display = "block";
  infoBox.style.opacity = "1";
infoBox.style.visibility = "visible";

const infoBoxTitle = document.getElementById("infoBoxTitle");
infoBoxTitle.innerHTML = `<h2>${point.name}</h2>`

void infoBox.offsetWidth;

const emblaSlides = document.getElementById("embla_slides");

const slidesHTML = point.rooms.map(room => `
  <div class="embla__slide"><img class="embla__slide__img" src="${room.photo}" width="600"></div>
`).join("");

emblaSlides.innerHTML = `${slidesHTML}`


requestAnimationFrame(() => {
    if (emblaApi) {
    emblaApi.destroy();
  }
  void document.querySelector('.embla').offsetWidth;
  const wrapperNode = document.querySelector('.embla')
  const viewportNode = wrapperNode.querySelector('.embla__viewport')
  emblaApi = EmblaCarousel(viewportNode, { loop: true,align: 'center',duration: 15 },[
    EmblaCarouselAutoplay({
      delay: 1000
    })
  ])
    const updateDesc = () => {
    const index = emblaApi.selectedScrollSnap();
    document.querySelector('.embla__slide__desc').innerHTML = `${point.rooms[index].name}`;
  };

  // Attach listener before reInit
  emblaApi.on('select', updateDesc);
  
  requestAnimationFrame(() => emblaApi.reInit());updateDesc();
})
})



.controls().addEventListener("start", () => {

  infoBox.style.display = "none";

})
    // start Camera position
    globe.pointOfView(
      { lat: 34, lng: -118.2, altitude: 0.5 },
      1000
    );

globe.globeMaterial(
  new THREE.MeshBasicMaterial({
    color: "#000000",
    transparent: true,
    opacity: 0.9
  })
);


globe.pointsTransitionDuration(0);

function updatePointSize() {

  const altitude = globe.pointOfView().altitude;
  let size = Math.sqrt(altitude) * 0.08;

  size = Math.max(0.01, size);
  size = Math.min(0.1, size);

  globe.pointRadius(size);
}

let rafPending = false;
globe.controls().addEventListener("change", () => {
  if (!rafPending) {
    rafPending = true;
    requestAnimationFrame(() => {
      updatePointSize();
      rafPending = false;
    });
  }
});

  </script>
  
</body>
</html>
