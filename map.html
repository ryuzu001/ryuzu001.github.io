<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escape Map</title>
  

    <!-- Load Libraries -->

<script src="https://cdn.jsdelivr.net/npm/embla-carousel@8.6.0/embla-carousel.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/embla-carousel-autoplay/embla-carousel-autoplay.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
<script src="scripts/rooms.js"></script>

<script src="https://unpkg.com/globe.gl"></script><script src="https://cdn.jsdelivr.net/npm/three/build/three.min.js"></script>
    <!-- Adjust CSS -->
    <link rel="stylesheet" href="stylesheets/map.css">

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    #globeViz {
      width: 100vw;
      height: 100vh;
    }

#infoBox {
opacity:0;
visibility: hidden;
position: absolute;

  top: 20px;
  right: 20px;

  width: 400px;
  height:450px;
  max-height: 50vh;

  overflow: visible;

  background: rgba(0,0,0,0.9);
  color: white;

  border-radius: 12px;
  border: 1px solid white;

  padding: 16px;

  z-index: 100;

  box-sizing: border-box;
}

@media (max-width: 768px) {

  #infoBox {

    left: 20px;
    right: 20px;

    width: auto;
  }

}

.embla__viewport {  overflow: hidden;}
.embla__container {  display: flex;  touch-action: pan-y pinch-zoom;}
.embla__slide {  flex: 0 0 100%;  min-width: 0; max-height: 30vh;}
.embla__slide img {
  width: 100%;
  height: 100%;

  object-fit: cover;

  display: block;
}
.embla__prev:disabled,.embla__next:disabled {  opacity: 0.3;  cursor: not-allowed;}

    .title {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      z-index: 10;
      font-size: 24px;
      font-weight: bold;
    }

#loadingScreen {
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.6s ease;
}

#loadingScreen.fade-out {
  opacity: 0;
  pointer-events: none;
}

#loadingContent {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  color: white;
  font-family: Arial, sans-serif;
}

#loadingSpinner {
  width: 40px;
  height: 40px;
  border: 3px solid rgba(255,255,255,0.2);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}



  </style>
  
</head>

<body>

<div id="loadingScreen">
  <div id="loadingContent">
    <div id="loadingSpinner"></div>
    <div id="loadingText">Loading...</div>
  </div>
</div>


  <div class="title"></div>
  <div id="globeViz"></div>
  <div id="infoBox">
    <div id="infoBoxTitle"></div>
    <div class="embla">
      <a id="link" href="" target="_blank">
      <div class="embla__viewport">
        <div class="embla__container" id="embla_slides">
        </div>
      </div>
      </a>
      <div class="embla__slide__desc"></div>
    </div>
</div>


</div>
  <script>
    // Create globe
    const globe = Globe()
      (document.getElementById("globeViz"));



globe.globeMaterial(
  new THREE.MeshBasicMaterial({
    color: "#000000",
    transparent: true,
    opacity: 0.9
  })
);
    // Globe appearance
    globe
      .globeImageUrl('images/earth-dark.avif')
      .backgroundImageUrl("images/night-sky.avif")
      .polygonsTransitionDuration(0)

      // Load country polygons
      .polygonsData([])

const mapReady = fetch("assets/map122.json")
  .then(res => res.json())
  .then(world => {
    const countries = topojson.feature(
      world,
      world.objects.layer
    ).features;

    globe
      .polygonsData(countries)
  .polygonCapColor("rgba(0,0,0,0.5)"
)

  .polygonStrokeColor(() => "#666666"
  )
.polygonSideColor(() => "rgba(0,0,0,0)")
        .polygonAltitude(0.001);
  });

     const infoBox = document.getElementById("infoBox")

globe
  // Atmosphere
  .showGlobe(true)
  .showAtmosphere(false)
  .atmosphereAltitude(0.15)

  // Points
  .pointsData(rooms)
  .pointLat(d => d.lat)
  .pointLng(d => d.lng)
  .pointAltitude(0.01)
  .pointColor(() => 'red')
  .pointRadius(0.01)
  .pointLabel(d => `
  <b>${d.name}</b>
  `)


let emblaApi = null;




globe.onPointClick(point => {

  const infoBox = document.getElementById("infoBox");

  infoBox.style.display = "block";
  infoBox.style.opacity = "1";
infoBox.style.visibility = "visible";

const infoBoxTitle = document.getElementById("infoBoxTitle");
infoBoxTitle.innerHTML = `<h2>${point.name}</h2>`

void infoBox.offsetWidth;

const emblaSlides = document.getElementById("embla_slides");

const slidesHTML = point.rooms.map((room, i) => {
  index=room.index ? `${room.index}` : `${i+1}`
  return `<div class="embla__slide"><img class="embla__slide__img" loading="lazy" src="./images/escaperooms/${point.photoname}`+index+`.avif" ></div>`
}).join("");

emblaSlides.innerHTML = `${slidesHTML}`

document.getElementById("link").href = `escaperooms?search=${point.name}`


requestAnimationFrame(() => {
    if (emblaApi) {
    emblaApi.destroy();
  }
  void document.querySelector('.embla').offsetWidth;
  const wrapperNode = document.querySelector('.embla')
  const viewportNode = wrapperNode.querySelector('.embla__viewport')
  emblaApi = EmblaCarousel(viewportNode, { loop: true,align: 'center',duration: 15 },[
    EmblaCarouselAutoplay({
      delay: 1000, stopOnInteraction: false
    })
  ])
    const updateDesc = () => {
    document.querySelector('.embla__slide__desc').innerHTML = `${point.rooms[emblaApi.selectedScrollSnap()].name}`;
  };

  // Attach listener before reInit
  emblaApi.on('select', updateDesc);
  
  requestAnimationFrame(() => emblaApi.reInit());updateDesc();
})

})



.controls().addEventListener("start", () => {

  infoBox.style.display = "none";

})





globe.pointsTransitionDuration(0);

function updatePointSize() {

  const altitude = globe.pointOfView().altitude;
  let size = Math.sqrt(altitude) * 0.08;

  size = Math.max(0.01, size);
  size = Math.min(0.1, size);

  globe.pointRadius(size);
}

let rafPending = false;
globe.controls().addEventListener("change", () => {
  if (!rafPending) {
    rafPending = true;
    requestAnimationFrame(() => {
      updatePointSize();
      rafPending = false;
    });
  }
});


const loadingScreen = document.getElementById("loadingScreen");

const dismissLoader = () => {
  loadingScreen.classList.add("fade-out");
  loadingScreen.addEventListener("transitionend", () => {
    loadingScreen.remove();
  }, { once: true });
};



// Globe ready callback wrapped in a promise
const globeReady = new Promise(resolve => globe.onGlobeReady(resolve));



// Dismiss loader when both resolve
Promise.all([mapReady, globeReady]).then(dismissLoader);

    // start Camera position
    globe.pointOfView(
      { lat: 34, lng: -118.2, altitude: 0.3 },
      2300
    );
  </script>
  
</body>
</html>
