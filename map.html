    <!-- Adjust CSS -->

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    #globeViz {
      width: 100vw;
      height: 100vh;
    }

#infoBox {
opacity:0;
visibility: hidden;
position: absolute;

  top: 20px;
  right: 20px;

  width: 400px;
  height:400px;
  max-height: 50vh;

  overflow: visible;

  background: rgba(0,0,0,0.9);
  color: white;

  border-radius: 12px;
  border: 1px solid white;

  padding: 16px;

  z-index: 100;

  box-sizing: border-box;
}

@media (max-width: 768px) {

  #infoBox {

    left: 20px;
    right: 20px;

    width: auto;
  }

}

.embla__viewport {  overflow: hidden;}
.embla__container {  display: flex;  touch-action: pan-y pinch-zoom;}
.embla__slide {  flex: 0 0 100%;  min-width: 0; max-height: 30vh;}
.embla__slide img {
  width: 100%;
  height: 100%;

  object-fit: cover;

  display: block;
}
.embla__prev:disabled,.embla__next:disabled {  opacity: 0.3;  cursor: not-allowed;}

    .title {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      z-index: 10;
      font-size: 24px;
      font-weight: bold;
    }
  </style>
  
</head>

function updatePointSize() {

  const altitude = globe.pointOfView().altitude;

let size = Math.sqrt(altitude) * 0.08;

  size = Math.max(0.01, size);
  size = Math.min(0.1, size);

  globe.pointRadius(size);
}

updatePointSize();

globe.controls().addEventListener("change", updatePointSize);
