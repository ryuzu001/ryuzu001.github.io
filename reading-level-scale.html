<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reading Level Scale</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, serif; background: #f5f3ee; display: flex; justify-content: center; padding: 40px 20px; min-height: 100vh; }
  .app { background: #fff; border-radius: 12px; padding: 36px 40px; max-width: 480px; width: 100%; box-shadow: 0 2px 16px rgba(0,0,0,0.08); }
  h1 { font-size: 20px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 28px; }
  .controls { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 8px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 11px; color: #666; letter-spacing: 0.06em; text-transform: uppercase; }
  .grade-btn { padding: 8px 16px; border: 1.5px solid #ccc; border-radius: 7px; background: #fff; color: #555; cursor: pointer; font-size: 14px; }
  .grade-btn.active { background: #1a4b8c; border-color: #1a4b8c; color: #fff; font-weight: 700; }
  input[type=number] { width: 120px; padding: 8px 10px; border: 1.5px solid #ccc; border-radius: 7px; font-size: 15px; outline: none; }
  input[type=number]:focus { border-color: #1a4b8c; }
  .ok-btn { padding: 8px 20px; border: none; border-radius: 7px; background: #1a4b8c; color: #fff; cursor: pointer; font-size: 14px; font-weight: 700; }
  .ok-btn:hover { background: #153d73; }
  .error { font-size: 13px; color: #c0392b; min-height: 20px; margin-bottom: 12px; }
  .viz-wrap { display: flex; justify-content: center; margin-bottom: 24px; }
  .viz { display: flex; align-items: flex-start; gap: 0; }
  .tick-area { width: 68px; position: relative; height: 440px; }
  .tick-lbl { position: absolute; right: 10px; font-size: 11px; color: #888; transform: translateY(-50%); white-space: nowrap; }
  .bar-area { width: 64px; position: relative; height: 440px; }
  .seg { position: absolute; left: 0; width: 64px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; border: 1px solid rgba(0,0,0,0.12); }
  .arrow-area { width: 80px; position: relative; height: 440px; }
  .arrow-pointer { position: absolute; left: 0; display: flex; align-items: center; transform: translateY(-50%); }
  .arrow-triangle { width: 0; height: 0; border-top: 7px solid transparent; border-bottom: 7px solid transparent; border-right: 12px solid #e53935; }
  .arrow-line { width: 30px; height: 2.5px; background: #e53935; }
  .arrow-dot { width: 7px; height: 7px; border-radius: 50%; background: #e53935; }
  .result-box { background: #f5f3ee; border-radius: 10px; padding: 16px 20px; text-align: center; }
  .result-level { font-size: 24px; font-weight: 700; color: #1a1a1a; }
  .result-sub { font-size: 13px; color: #777; margin-top: 4px; }
</style>
</head>
<body>
<div class="app">
  <h1>Reading Level Scale</h1>
  <p class="subtitle">Enter a score to find the reading level.</p>

  <div class="controls">
    <div class="field">
      <label>Grade</label>
      <div style="display:flex;gap:8px;">
        <button class="grade-btn active" id="btn6" onclick="setGrade(6)">6th grade</button>
        <button class="grade-btn" id="btn7" onclick="setGrade(7)">7th grade</button>
      </div>
    </div>
    <div class="field">
      <label>Score</label>
      <input type="number" id="scoreInput" placeholder="e.g. 2400" />
    </div>
    <div class="field" style="justify-content:flex-end;">
      <button class="ok-btn" onclick="evaluateNum()">OK</button>
    </div>
  </div>
  <div id="error" class="error"></div>

  <div class="viz-wrap">
    <div class="viz">
      <div class="tick-area" id="tickArea"></div>
      <div class="bar-area" id="barArea"></div>
      <div class="arrow-area" id="arrowArea"></div>
    </div>
  </div>

  <div class="result-box">
    <div class="result-level" id="resultLevel" style="color:#bbb;font-size:15px;font-weight:400;">Enter a score above</div>
    <div class="result-sub" id="resultSub"></div>
  </div>
</div>

<script>
var GRADES = {
  6: [2235, 2472, 2551, 2609, 2780],
  7: [2250, 2483, 2566, 2634, 2820]
};
var SEG_COLORS = [
  {bg:'#1a4b8c', text:'#fff'},
  {bg:'#4a7fc1', text:'#fff'},
  {bg:'#92b8e3', text:'#1a3a6a'},
  {bg:'#d6e8f7', text:'#1a3a6a'}
];
var BAR_H = 440;
var grade = 6;

function toY(score, min, max) {
  return BAR_H - ((score - min) / (max - min)) * BAR_H;
}

function render() {
  var segs = GRADES[grade];
  var min = segs[0], max = segs[4];

  var tickArea = document.getElementById('tickArea');
  tickArea.innerHTML = '';
  for (var i = 0; i < segs.length; i++) {
    var y = toY(segs[i], min, max);
    var lbl = document.createElement('div');
    lbl.className = 'tick-lbl';
    lbl.style.top = y + 'px';
    lbl.textContent = segs[i];
    tickArea.appendChild(lbl);
  }

  var barArea = document.getElementById('barArea');
  barArea.innerHTML = '';
  for (var j = 0; j < 4; j++) {
    var yTop = toY(segs[j+1], min, max);
    var yBot = toY(segs[j], min, max);
    var seg = document.createElement('div');
    seg.className = 'seg';
    seg.style.top = yTop + 'px';
    seg.style.height = (yBot - yTop) + 'px';
    seg.style.background = SEG_COLORS[j].bg;
    seg.style.color = SEG_COLORS[j].text;
    seg.textContent = 'Level ' + (j+1);
    barArea.appendChild(seg);
  }

  document.getElementById('arrowArea').innerHTML = '';
}

function setGrade(g) {
  grade = g;
  document.getElementById('btn6').className = 'grade-btn' + (g===6?' active':'');
  document.getElementById('btn7').className = 'grade-btn' + (g===7?' active':'');
  document.getElementById('error').textContent = '';
  document.getElementById('resultLevel').textContent = 'Enter a score above';
  document.getElementById('resultLevel').style.cssText = 'color:#bbb;font-size:15px;font-weight:400;';
  document.getElementById('resultSub').textContent = '';
  render();
}

function evaluateNum() {
  var raw = document.getElementById('scoreInput').value;
  var val = parseInt(raw, 10);
  var segs = GRADES[grade];
  var err = document.getElementById('error');
  err.textContent = '';

  if (!raw || isNaN(val)) { err.textContent = 'Please enter a valid score.'; return; }
  if (val < segs[0] || val > segs[4]) {
    err.textContent = 'Score must be between ' + segs[0] + ' and ' + segs[4] + ' for ' + grade + 'th grade.';
    return;
  }

  var level = 0;
  for (var i = 0; i < 4; i++) {
    if (val >= segs[i] && val <= segs[i+1]) { level = i+1; break; }
  }

  var y = toY(val, segs[0], segs[4]);
  var arrowArea = document.getElementById('arrowArea');
  arrowArea.innerHTML = '';
  var ptr = document.createElement('div');
  ptr.className = 'arrow-pointer';
  ptr.style.top = y + 'px';
  ptr.innerHTML = '<div class="arrow-triangle"></div><div class="arrow-line"></div><div class="arrow-dot"></div>';
  arrowArea.appendChild(ptr);

  var lvEl = document.getElementById('resultLevel');
  lvEl.textContent = 'Level ' + level;
  lvEl.style.cssText = 'color:#1a1a1a;font-size:24px;font-weight:700;';
  document.getElementById('resultSub').textContent =
    'Score ' + val + ' — Level ' + level + ' (' + segs[level-1] + '\u2013' + segs[level] + ') for ' + grade + 'th grade';
}

render();
</script>
</body>
</html>
